<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Login</title>

<style>

body{

    font-family:Arial;
    background:#f4f4f4;

}

.container{

    width:350px;

    margin:100px auto;

    background:white;

    padding:30px;

    border-radius:10px;

    box-shadow:0px 0px 10px gray;

}

input{

    width:100%;

    padding:10px;

    margin-top:10px;

}

button{

    width:100%;

    margin-top:20px;

    padding:10px;

}

.error{

    color:red;

}

</style>

</head>

<body>

<div class="container">

<h2>Login</h2>

<form action="/login" method="post">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button>

Login

</button>

</form>

<p class="error" th:text="${error}"></p>

</div>

</body>

</html>
