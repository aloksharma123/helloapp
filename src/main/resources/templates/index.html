<form action="/greet" method="post">

    <label>Name</label><br>
    <input type="text" name="name" required><br><br>

    <label>Age</label><br>
    <input type="number" name="age" required><br><br>

    <label>Favorite Language</label><br>

    <select name="language">

        <option>Java</option>
        <option>Python</option>
        <option>C++</option>

    </select>

    <br><br>

    <button type="submit">
        Generate Greeting
    </button>

</form>
